<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ducktop2 system architecture</title>
  <desc id="desc">Block diagram of the Ducktop2 power system, LattePanda Mu compute module, storage, display, controllers, removable radio board, audio, keyboard, and external interfaces.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#63727a"/>
    </marker>
    <style>
      .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17242a; }
      .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536169; }
      .group-title { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .block-title { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17242a; }
      .body { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #314149; }
      .small { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #536169; }
      .line { fill: none; stroke: #63727a; stroke-width: 3; marker-end: url(#arrow); }
      .bus { fill: none; stroke: #2a7f62; stroke-width: 4; marker-end: url(#arrow); }
      .box { stroke: #b8c2c7; stroke-width: 2; rx: 6; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f5f7f8"/>
  <text x="60" y="66" class="title">Ducktop2 system architecture</text>
  <text x="60" y="98" class="subtitle">Six-layer LattePanda Mu laptop motherboard, shown at schematic-complete / placement-stage status</text>

  <rect x="50" y="135" width="365" height="650" rx="8" fill="#eef2f3" stroke="#c7d0d4" stroke-width="2"/>
  <rect x="50" y="135" width="365" height="48" rx="8" fill="#334f5a"/>
  <rect x="50" y="175" width="365" height="8" fill="#334f5a"/>
  <text x="72" y="166" class="group-title">Power</text>

  <rect x="75" y="210" width="315" height="92" class="box" fill="#ffffff"/>
  <text x="95" y="239" class="block-title">External input</text>
  <text x="95" y="266" class="body">2x USB-C PD / data inputs</text>
  <text x="95" y="288" class="body">Protected AUX / DC input</text>

  <rect x="75" y="330" width="315" height="112" class="box" fill="#fff8e5"/>
  <text x="95" y="359" class="block-title">3S battery</text>
  <text x="95" y="386" class="body">BQ77915 cell protection</text>
  <text x="95" y="408" class="body">LTC4368 + fuse backup layer</text>
  <text x="95" y="430" class="body">BQ34Z100 fuel gauge</text>

  <rect x="75" y="470" width="315" height="108" class="box" fill="#ffffff"/>
  <text x="95" y="499" class="block-title">Charging and source control</text>
  <text x="95" y="526" class="body">BQ25798 charger / NVDC path</text>
  <text x="95" y="548" class="body">Default-off eFuses and source manager</text>

  <rect x="75" y="606" width="315" height="138" class="box" fill="#e8f4ef"/>
  <text x="95" y="635" class="block-title">System rails</text>
  <text x="95" y="662" class="body">Regulated MU_12V</text>
  <text x="95" y="684" class="body">SYS_5V and SYS_3V3</text>
  <text x="95" y="706" class="body">Always-on MCU_3V3 domain</text>
  <text x="95" y="728" class="small">Hardware defaults keep sources and loads off</text>

  <path d="M232 302 V330" class="line"/>
  <path d="M232 442 V470" class="line"/>
  <path d="M232 578 V606" class="line"/>

  <rect x="485" y="220" width="520" height="340" rx="8" fill="#e8f4ef" stroke="#2a7f62" stroke-width="3"/>
  <rect x="485" y="220" width="520" height="54" rx="8" fill="#2a7f62"/>
  <rect x="485" y="266" width="520" height="8" fill="#2a7f62"/>
  <text x="510" y="255" class="group-title">LattePanda Mu N305 / N100 compute module</text>
  <text x="520" y="315" class="block-title">x86 compute</text>
  <text x="520" y="343" class="body">Intel graphics, LPDDR5, 64 GB eMMC</text>
  <text x="520" y="365" class="body">PCIe Gen3, native USB 3.2, HDMI/DP, eDP</text>

  <rect x="520" y="404" width="215" height="112" class="box" fill="#ffffff"/>
  <text x="540" y="433" class="block-title">Internal display</text>
  <text x="540" y="460" class="body">40-pin direct eDP</text>
  <text x="540" y="482" class="body">2560x1600 at 120 Hz</text>
  <text x="540" y="504" class="small">AUO B160QAN03.K</text>

  <rect x="755" y="404" width="215" height="112" class="box" fill="#ffffff"/>
  <text x="775" y="433" class="block-title">Storage / wireless</text>
  <text x="775" y="460" class="body">M.2 M-key NVMe x4</text>
  <text x="775" y="482" class="body">M.2 E-key AX210-class</text>
  <text x="775" y="504" class="small">PCIe + USB 2.0</text>

  <path d="M390 675 H450 V390 H485" class="bus"/>

  <rect x="1090" y="135" width="460" height="650" rx="8" fill="#eef2f3" stroke="#c7d0d4" stroke-width="2"/>
  <rect x="1090" y="135" width="460" height="48" rx="8" fill="#334f5a"/>
  <rect x="1090" y="175" width="460" height="8" fill="#334f5a"/>
  <text x="1112" y="166" class="group-title">I/O and peripherals</text>

  <rect x="1115" y="210" width="410" height="92" class="box" fill="#ffffff"/>
  <text x="1135" y="239" class="block-title">External I/O</text>
  <text x="1135" y="266" class="body">5x USB-C data; two also accept PD</text>
  <text x="1135" y="288" class="body">HDMI-A, Gigabit Ethernet, antenna connectors</text>

  <rect x="1115" y="330" width="410" height="116" class="box" fill="#ffffff"/>
  <text x="1135" y="359" class="block-title">Internal USB devices</text>
  <text x="1135" y="386" class="body">USB7206C hub, trackpad, system codec</text>
  <text x="1135" y="408" class="body">STM32 EC and RP2350 maker controller</text>
  <text x="1135" y="430" class="body">Optional radio-board USB codec</text>

  <rect x="1115" y="474" width="410" height="116" class="box" fill="#ffffff"/>
  <text x="1135" y="503" class="block-title">Laptop controls</text>
  <text x="1135" y="530" class="body">Cherry MX ULP keyboard daughterboard</text>
  <text x="1135" y="552" class="body">Dual SSD1306 displays, fan, buttons</text>
  <text x="1135" y="574" class="body">Speakers and digital microphone</text>

  <rect x="1115" y="618" width="410" height="126" class="box" fill="#fff8e5"/>
  <text x="1135" y="647" class="block-title">Removable radio and navigation board</text>
  <text x="1135" y="674" class="body">DRA818V 2 m and DRA818U 70 cm</text>
  <text x="1135" y="696" class="body">External LPFs and antenna switching</text>
  <text x="1135" y="718" class="body">u-blox MAX-M10S GNSS</text>

  <path d="M1005 295 H1090" class="line"/>
  <path d="M1005 365 H1060 V388 H1115" class="line"/>
  <path d="M1005 455 H1060 V532 H1115" class="line"/>
  <path d="M1005 500 H1040 V681 H1115" class="line"/>

  <rect x="485" y="610" width="250" height="134" class="box" fill="#eaf2f7"/>
  <text x="510" y="641" class="block-title">STM32F407 embedded controller</text>
  <text x="510" y="670" class="body">Power policy and sequencing</text>
  <text x="510" y="692" class="body">Keyboard, cooling and lid controls</text>
  <text x="510" y="714" class="body">Host USB HID / service interface</text>

  <rect x="755" y="610" width="250" height="134" class="box" fill="#eaf2f7"/>
  <text x="780" y="641" class="block-title">RP2350 maker controller</text>
  <text x="780" y="670" class="body">Independent USB device</text>
  <text x="780" y="692" class="body">Protected user rails and GPIO</text>
  <text x="780" y="714" class="body">SWD, BOOT and reset access</text>

  <path d="M610 560 V610" class="line"/>
  <path d="M880 560 V610" class="line"/>

  <rect x="50" y="824" width="1500" height="42" rx="6" fill="#17242a"/>
  <text x="800" y="851" text-anchor="middle" class="group-title">Current state: schematic checks pass; high-speed placement and routing are still in progress</text>
</svg>
